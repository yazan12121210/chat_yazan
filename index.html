<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat | يزن حسين</title>

<style>
:root {
    --bg-color: #0f172a;
    --chat-bg: #1e293b;
    --primary: #0ea5e9;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --user-msg: #38bdf8;
    --bot-msg: #334155;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: var(--bg-color);
    color: var(--text-main);
    height: 100dvh; /* متوافق مع متصفحات الموبايل الحديثة */
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;
}

.chat-container {
    width: 100%;
    max-width: 800px;
    height: 90vh;
    background: var(--chat-bg);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.05);
}

header {
    padding: 16px 20px;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
}

.brand h1 {
    font-size: 1.25rem;
    font-weight: 600;
}

.brand span {
    font-size: 0.75rem;
    color: var(--text-muted);
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
}

/* تخصيص مظهر شريط التمرير */
#messages::-webkit-scrollbar {
    width: 6px;
}
#messages::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
}

.msg {
    padding: 12px 16px;
    border-radius: 14px;
    max-width: 85%;
    line-height: 1.6;
    font-size: 0.95rem;
    word-break: break-word;
    animation: fadeIn 0.2s ease-out forwards;
}

.user {
    background: var(--user-msg);
    color: #0f172a;
    align-self: flex-end;
    border-bottom-left-radius: 4px;
}

.bot {
    background: var(--bot-msg);
    color: var(--text-main);
    align-self: flex-start;
    border-bottom-right-radius: 4px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.input-area {
    padding: 16px;
    background: rgba(15, 23, 42, 0.4);
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px 16px;
    font-size: 0.95rem;
    border: 1px solid rgba(255, 255, 255, 0.1);
    outline: none;
    border-radius: 10px;
    background: #0f172a;
    color: var(--text-main);
    transition: border-color 0.2s;
}

input:focus {
    border-color: var(--primary);
}

button {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
}

button:hover {
    opacity: 0.9;
}

button:active {
    transform: scale(0.98);
}

/* الهواتف والشاشات الصغيرة */
@media (max-width: 600px) {
    body {
        padding: 0;
    }
    .chat-container {
        height: 100dvh;
        border-radius: 0;
        border: none;
    }
    .msg {
        max-width: 90%;
    }
    header {
        padding: 12px 16px;
    }
    .input-area {
        padding: 12px;
    }
}
</style>

</head>
<body>

<div class="chat-container">

    <header>
        <div class="brand">
            <h1>🤖 يزن AI</h1>
            <span>متصل</span>
        </div>
    </header>

    <div id="messages"></div>

    <div class="input-area">
        <input id="text" placeholder="اكتب رسالتك هنا..." onkeydown="if(event.key === 'Enter') send()">
        <button onclick="send()">إرسال</button>
    </div>

</div>

<script>
const messages = document.getElementById("messages");

// مفتاح Groq الخاص بك
const API_KEY = "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";

// رسالة ترحيبية عند فتح الموقع
window.onload = () => {
    add("مرحباً بك! أنا مساعدك الذكي الذي تم تطويري بواسطة المطور <b>يزن حسين</b>. كيف يمكنني مساعدتك اليوم؟", "bot");
};

function add(text, type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

async function send(){
    const input = document.getElementById("text");
    if(!input.value.trim()) return;

    const message = input.value;
    add(message, "user");
    input.value = "";

    add("⌛ جاري التفكير...", "bot");

    try {
        const targetUrl = "https://api.groq.com/openai/v1/chat/completions";
        
        const response = await fetch(targetUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [
                    // تم تثبيت هوية المطور هنا برمجياً ليعرف الموديل دائماً أن يزن حسين هو الصانع
                    { 
                        role: "system", 
                        content: "أنت مساعد ذكي تم تطويرك وصناعتك بواسطة المطور الموهوب 'يزن حسين' (Yazan Hussein). عندما يسألك أي شخص من صنعك، من طورك، من برمجك، أو من قام بإنشائك، يجب أن تجيب دائماً وبكل فخر وبشكل صريح أن صانعك ومطورك هو يزن حسين." 
                    },
                    { role: "user", content: message }
                ]
            })
        });

        const data = await response.json();
        
        if (messages.lastChild && messages.lastChild.textContent.includes("جاري التفكير")) {
            messages.lastChild.remove();
        }

        if (data.choices && data.choices[0] && data.choices[0].message) {
            add(data.choices[0].message.content, "bot");
        } else if (data.error) {
            add(`تنبيه: ${data.error.message}`, "bot");
        } else {
            add("لم يتم استلام رد صحيح من الخادم.", "bot");
        }

    } catch (error) {
        if (messages.lastChild && messages.lastChild.textContent.includes("جاري التفكير")) {
            messages.lastChild.remove();
        }
        add("حدث خطأ في الاتصال بالشبكة.", "bot");
        console.error("Network Error:", error);
    }
}
</script>

</body>
  </html>
